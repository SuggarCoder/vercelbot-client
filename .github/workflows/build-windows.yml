name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows.yml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "apps/chatbot/**"
      - "apps/gpas-app/**"
  pull_request:
    paths:
      - ".github/workflows/build-windows.yml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "apps/chatbot/**"
      - "apps/gpas-app/**"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CI: true
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/chatbot/pnpm-lock.yaml
            apps/gpas-app/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/gpas-app/src-tauri

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create chatbot .env.local
        shell: pwsh
        run: |
          "VITE_CENTRAL_API_BASE_URL=/api" |
            Set-Content -Path "apps/chatbot/.env.local" -Encoding utf8NoBOM

      - name: Create gpas-app config
        shell: pwsh
        env:
          CHATBOT_CENTRAL_API_BASE_URL: ${{ secrets.CHATBOT_CENTRAL_API_BASE_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CHATBOT_CENTRAL_API_BASE_URL)) {
            throw "Missing GitHub secret CHATBOT_CENTRAL_API_BASE_URL"
          }

          @"
          {
            "remoteApiBaseUrl": "$env:CHATBOT_CENTRAL_API_BASE_URL",
            "allowedCommands": []
          }
          "@ | Set-Content -Path "apps/gpas-app/gpas.config.json" -Encoding utf8NoBOM

      - name: Typecheck chatbot
        run: pnpm run typecheck:chatbot

      - name: Build chatbot
        run: pnpm run build:chatbot

      - name: Check gpas-app Rust crate
        run: pnpm run check:gpas-app

      - name: Build gpas-app for Windows
        run: pnpm --dir apps/gpas-app tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpas-app-windows
          path: |
            apps/gpas-app/src-tauri/target/release/bundle/msi/**
            apps/gpas-app/src-tauri/target/release/bundle/nsis/**
            apps/gpas-app/src-tauri/target/release/gpas-app.exe
          if-no-files-found: error
